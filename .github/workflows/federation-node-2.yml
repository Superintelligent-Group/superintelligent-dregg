name: "Federation Node 2"

on:
  schedule:
    # Staggered: 1:40, 6:40, 11:40, 16:40, 21:40
    - cron: '40 1,6,11,16,21 * * *'
  workflow_dispatch:

concurrency:
  group: federation-node-2
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  NODE_ID: "2"
  STATE_DIR: /tmp/pyana-state

jobs:
  run-node:
    name: "Node 2 — Federation"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: federation-node-2-state
          path: ${{ env.STATE_DIR }}
        continue-on-error: true

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "relay -> relay/target"

      - name: Build pyana-relay
        working-directory: relay
        run: cargo build --release

      - name: Prepare state directory
        run: mkdir -p "$STATE_DIR"

      - name: Load node identity
        run: |
          echo "${{ secrets.PYANA_NODE_2_KEY }}" > "$STATE_DIR/node_key.hex"
          echo "Node 2 identity loaded"

      - name: Download discovery file
        uses: actions/download-artifact@v4
        with:
          name: federation-discovery
          path: /tmp/discovery
        continue-on-error: true

      - name: Resolve peers
        id: peers
        run: |
          PEERS=""
          if [ -f /tmp/discovery/discovery.json ]; then
            PEERS=$(jq -r '.federation[] | select(.role != "node-2") | .node_id' /tmp/discovery/discovery.json 2>/dev/null | paste -sd, -)
          fi
          echo "peer_list=$PEERS" >> "$GITHUB_OUTPUT"
          echo "Resolved peers: $PEERS"

      - name: Run federation node
        env:
          PYANA_ROOT_KEY: ${{ secrets.PYANA_ROOT_KEY }}
          PYANA_NODE_KEY: ${{ secrets.PYANA_NODE_2_KEY }}
          RUST_LOG: info
        run: |
          # Start the relay in background
          ./relay/target/release/pyana-relay \
            --state-dir "$STATE_DIR" \
            --discovery-file "$STATE_DIR/discovery.json" \
            --peers "${{ steps.peers.outputs.peer_list }}" \
            --node-role node-2 &
          NODE_PID=$!

          echo "Node started with PID $NODE_PID"

          # Periodic state snapshots every 5 minutes
          ELAPSED=0
          INTERVAL=300
          MAX_RUNTIME=20700  # 5h45m in seconds

          while [ $ELAPSED -lt $MAX_RUNTIME ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # Check if node is still running
            if ! kill -0 $NODE_PID 2>/dev/null; then
              echo "Node process exited unexpectedly at ${ELAPSED}s"
              break
            fi

            # Signal the node to snapshot (USR1)
            kill -USR1 $NODE_PID 2>/dev/null || true
            echo "Snapshot triggered at ${ELAPSED}s ($(date -u +%H:%M:%S))"
          done

          # Graceful shutdown
          echo "Sending SIGTERM for graceful shutdown..."
          kill -TERM $NODE_PID 2>/dev/null || true
          wait $NODE_PID 2>/dev/null || true
          echo "Node shutdown complete"

      - name: Upload state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: federation-node-2-state
          path: ${{ env.STATE_DIR }}/
          retention-days: 7
          overwrite: true

      - name: Notify discovery service
        if: always()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: node-state-updated
          client-payload: '{"node": "2", "role": "node-2"}'
        continue-on-error: true
