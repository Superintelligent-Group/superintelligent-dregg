name: Nightly Features

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  binius:
    name: Check (binius)
    runs-on: ubuntu-latest
    # Binius requires nightly Rust toolchain — tested separately
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p pyana-circuit --features binius

  plonky3:
    name: Test (plonky3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p pyana-circuit --features plonky3

  # NOTE: The `mina` feature now uses git deps and can be built in CI.
  # Uncomment if a mina CI job is needed in the future.
